<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Динамическая форма</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .content { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        input.error { border-color: #f56565; background: #fff5f5; }
        .error-message { color: #f56565; font-size: 12px; margin-top: 5px; display: none; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-success { background: #c6f6d5; color: #22543d; }
        .alert-error { background: #fed7d7; color: #742a2a; }
        .info-box {
            background: #f7fafc;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #667eea;
        }
        .mode-switch {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .mode-btn {
            flex: 1;
            padding: 10px;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            border-radius: 8px;
        }
        .mode-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>📊 Динамическая форма</h1>
            <p>Поля из Google Sheets</p>
        </div>
        <div class="content">
            <div class="mode-switch">
                <button class="mode-btn active" onclick="setMode('remote')">🌐 Удаленный</button>
                <button class="mode-btn" onclick="setMode('test')">🧪 Тестовый</button>
            </div>
            <div id="alert" class="alert"></div>
            <div class="info-box" id="infoBox">⚡ Загрузка полей...</div>
            <div id="loading"><div class="spinner"></div></div>
            <form id="form" style="display: none;">
                <div id="fields"></div>
                <button type="submit" id="submitBtn">💾 Сохранить данные</button>
            </form>
        </div>
    </div>
</div>

<script>
// ========== ВАШИ PRODUCTION URL ==========
// ВСТАВЬТЕ СЮДА URL, КОТОРЫЕ ВЫ СКОПИРОВАЛИ ИЗ n8n
const PRODUCTION_URL = 'https://4yzm-gv2z-j6ws.gw-1a.dockhost.net';
const GET_FIELDS_URL = `${PRODUCTION_URL}/webhook/get-fields`;
const SAVE_DATA_URL = `${PRODUCTION_URL}/webhook/save-data`;

// Тестовые данные (для проверки интерфейса)
const TEST_FIELDS = [
    { id: "email", label: "Email", type: "email", required: true, placeholder: "example@mail.com" },
    { id: "name", label: "Имя", type: "text", required: true, placeholder: "Ваше имя" },
    { id: "phone", label: "Телефон", type: "tel", required: true, placeholder: "+7 (999) 123-45-67" }
];

let currentMode = 'remote';
let formFields = [];
let isSubmitting = false;

function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    loadFields();
}

function showAlert(msg, type) {
    const alertDiv = document.getElementById('alert');
    alertDiv.className = `alert alert-${type}`;
    alertDiv.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span><span>${msg}</span>`;
    alertDiv.style.display = 'block';
    setTimeout(() => alertDiv.style.display = 'none', 5000);
}

function showLoading(show) {
    document.getElementById('loading').style.display = show ? 'block' : 'none';
    document.getElementById('form').style.display = show ? 'none' : 'block';
    document.getElementById('infoBox').style.display = show ? 'none' : 'flex';
}

function renderForm(fields) {
    const container = document.getElementById('fields');
    container.innerHTML = '';
    fields.forEach((field, i) => {
        const div = document.createElement('div');
        div.className = 'form-group';
        div.innerHTML = `
            <label>${field.label}${field.required ? '<span style="color:#f56565"> *</span>' : ''}</label>
            <input type="${field.type}" id="${field.id}" placeholder="${field.placeholder}" ${field.required ? 'required' : ''}>
            <div class="error-message" id="${field.id}-error"></div>
        `;
        container.appendChild(div);
        const input = document.getElementById(field.id);
        input.addEventListener('input', () => validateField(field.id));
        input.addEventListener('blur', () => validateField(field.id));
    });
}

function validateField(fieldId) {
    const input = document.getElementById(fieldId);
    const errorDiv = document.getElementById(`${fieldId}-error`);
    const field = formFields.find(f => f.id === fieldId);
    if (!input || !field) return true;
    const value = input.value.trim();
    let isValid = true;
    let msg = '';
    if (field.required && !value) { isValid = false; msg = 'Обязательное поле'; }
    else if (field.type === 'email' && value && !/^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(value)) { isValid = false; msg = 'Неверный email'; }
    else if (field.type === 'tel' && value && !/^[\d\s+()-]{10,}$/.test(value)) { isValid = false; msg = 'Неверный телефон'; }
    if (!isValid) { input.classList.add('error'); errorDiv.textContent = msg; errorDiv.style.display = 'block'; }
    else { input.classList.remove('error'); errorDiv.style.display = 'none'; }
    return isValid;
}

function validateForm() {
    let valid = true;
    formFields.forEach(f => { if (!validateField(f.id)) valid = false; });
    return valid;
}

async function loadFieldsRemote() {
    const response = await fetch(GET_FIELDS_URL, {
        method: 'GET',
        headers: { 'Accept': 'application/json' }
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const text = await response.text();
    if (!text) throw new Error('Пустой ответ');
    const data = JSON.parse(text);
    return data.fields || data;
}

async function loadFields() {
    showLoading(true);
    try {
        if (currentMode === 'remote') {
            formFields = await loadFieldsRemote();
        } else {
            formFields = TEST_FIELDS;
        }
        if (!formFields || formFields.length === 0) throw new Error('Нет полей');
        renderForm(formFields);
        document.getElementById('infoBox').innerHTML = `📋 Найдено ${formFields.length} полей`;
        showLoading(false);
        showAlert(`Форма загружена (${currentMode === 'remote' ? 'удаленный' : 'тестовый'} режим)`, 'success');
    } catch (err) {
        console.error(err);
        document.getElementById('infoBox').innerHTML = '❌ Ошибка загрузки. Проверьте URL и CORS';
        showLoading(false);
        showAlert(`Ошибка: ${err.message}`, 'error');
    }
}

async function submitForm(e) {
    e.preventDefault();
    if (isSubmitting) return;
    if (!validateForm()) { showAlert('Исправьте ошибки', 'error'); return; }
    isSubmitting = true;
    const btn = document.getElementById('submitBtn');
    const originalText = btn.innerHTML;
    btn.innerHTML = '⏳ Сохранение...';
    btn.disabled = true;
    try {
        const data = [];
        formFields.forEach(f => {
            const input = document.getElementById(f.id);
            if (input) data.push({ id: f.id, value: input.value.trim() });
        });
        if (currentMode === 'test') {
            showAlert('Тестовый режим: данные не отправлены', 'success');
            formFields.forEach(f => { const inp = document.getElementById(f.id); if (inp) inp.value = ''; });
        } else {
            const response = await fetch(SAVE_DATA_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fields: data, timestamp: new Date().toISOString() })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const result = await response.json();
            if (result.success !== false) {
                showAlert('✅ Данные сохранены!', 'success');
                formFields.forEach(f => { const inp = document.getElementById(f.id); if (inp) inp.value = ''; });
            } else throw new Error(result.message || 'Ошибка');
        }
    } catch (err) {
        showAlert(`Ошибка: ${err.message}`, 'error');
    } finally {
        isSubmitting = false;
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadFields();
    document.getElementById('form').addEventListener('submit', submitForm);
});
</script>
</body>
</html>
