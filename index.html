<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Динамическая форма - Google Sheets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .url-config {
            background: #f7fafc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .url-config label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
        }

        .url-config input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
        }

        .url-config input:focus {
            outline: none;
            border-color: #667eea;
        }

        .mode-switch {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .info-box {
            background: #f7fafc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #48bb78;
        }

        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid #f56565;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        input.error {
            border-color: #f56565;
            background: #fff5f5;
        }

        .error-message {
            color: #f56565;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            background: #f7fafc;
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
            color: #718096;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>📊 Динамическая форма</h1>
                <p>Поля из Google Sheets</p>
            </div>
            <div class="content">
                <div class="url-config">
                    <label>🔗 URL сервера n8n:</label>
                    <input type="text" id="serverUrl" placeholder="https://ваш-сервер-n8n.com" value="">
                    <small style="color: #718096; display: block; margin-top: 5px;">
                        Вставьте production URL из n8n (например: https://4yzm-gv2z-j6ws.gw-1a.dockhost.net)
                    </small>
                </div>

                <div class="mode-switch">
                    <button class="mode-btn active" onclick="setMode('remote')">🌐 Удаленный</button>
                    <button class="mode-btn" onclick="setMode('test')">🧪 Тестовый</button>
                </div>
                
                <div id="alert" class="alert"></div>
                
                <div class="info-box" id="infoBox">
                    ⚡ Настройте URL и нажмите "Загрузить поля"
                </div>

                <button onclick="loadFields()" style="margin-bottom: 20px; background: #48bb78;">🔄 Загрузить поля</button>
                
                <div id="loading" style="display: none;">
                    <div class="spinner"></div>
                </div>
                
                <form id="form" style="display: none;">
                    <div id="fields"></div>
                    <button type="submit" id="submitBtn">💾 Сохранить данные</button>
                </form>
                
                <div class="status" id="status">
                    Статус: ожидание настройки
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'remote';
        let formFields = [];
        let isSubmitting = false;

        function getServerUrl() {
            let url = document.getElementById('serverUrl').value.trim();
            if (!url) {
                showAlert('❌ Введите URL сервера n8n', 'error');
                return null;
            }
            // Убираем слеш в конце если есть
            url = url.replace(/\/$/, '');
            return url;
        }

        function getUrls() {
            const serverUrl = getServerUrl();
            if (!serverUrl) return null;
            return {
                getFields: `${serverUrl}/webhook/get-fields`,
                saveData: `${serverUrl}/webhook/save-data`
            };
        }

        const TEST_FIELDS = [
            { id: "email", label: "Email", type: "email", required: true, placeholder: "example@mail.com" },
            { id: "name", label: "Имя", type: "text", required: true, placeholder: "Ваше имя" },
            { id: "phone", label: "Телефон", type: "tel", required: true, placeholder: "+7 (999) 123-45-67" }
        ];

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (mode === 'test') {
                document.getElementById('infoBox').innerHTML = '🧪 Тестовый режим: используются демо-поля';
                loadTestFields();
            }
        }

        function showAlert(msg, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = msg;
            alertDiv.style.display = 'block';
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            if (!show && formFields.length > 0) {
                document.getElementById('form').style.display = 'block';
            } else if (!show && formFields.length === 0) {
                document.getElementById('form').style.display = 'none';
            }
        }

        function renderForm(fields) {
            const container = document.getElementById('fields');
            container.innerHTML = '';
            
            fields.forEach(field => {
                const div = document.createElement('div');
                div.className = 'form-group';
                const requiredMark = field.required ? '<span style="color:#f56565"> *</span>' : '';
                div.innerHTML = `
                    <label>${field.label}${requiredMark}</label>
                    <input type="${field.type}" id="${field.id}" placeholder="${field.placeholder}" ${field.required ? 'required' : ''}>
                    <div class="error-message" id="${field.id}-error"></div>
                `;
                container.appendChild(div);
                
                const input = document.getElementById(field.id);
                input.addEventListener('input', () => validateField(field.id));
                input.addEventListener('blur', () => validateField(field.id));
            });
        }

        function validateField(fieldId) {
            const input = document.getElementById(fieldId);
            const errorDiv = document.getElementById(`${fieldId}-error`);
            const field = formFields.find(f => f.id === fieldId);
            
            if (!input || !field) return true;
            
            const value = input.value.trim();
            let isValid = true;
            let msg = '';
            
            if (field.required && !value) {
                isValid = false;
                msg = 'Обязательное поле';
            } else if (field.type === 'email' && value && !/^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(value)) {
                isValid = false;
                msg = 'Неверный email';
            } else if (field.type === 'tel' && value && !/^[\d\s+()-]{10,}$/.test(value)) {
                isValid = false;
                msg = 'Неверный телефон';
            }
            
            if (!isValid) {
                input.classList.add('error');
                errorDiv.textContent = msg;
                errorDiv.style.display = 'block';
            } else {
                input.classList.remove('error');
                errorDiv.style.display = 'none';
            }
            
            return isValid;
        }

        function validateForm() {
            let valid = true;
            formFields.forEach(f => {
                if (!validateField(f.id)) valid = false;
            });
            return valid;
        }

        async function loadRemoteFields() {
            const urls = getUrls();
            if (!urls) return;
            
            try {
                const response = await fetch(urls.getFields, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                return data.fields || data;
            } catch (err) {
                throw new Error(`Не удалось загрузить поля: ${err.message}`);
            }
        }

        function loadTestFields() {
            formFields = TEST_FIELDS;
            renderForm(formFields);
            document.getElementById('infoBox').innerHTML = `🧪 Тестовый режим: ${formFields.length} полей`;
            document.getElementById('status').innerHTML = `Статус: тестовый режим (${formFields.length} полей)`;
            showAlert('Тестовый режим активирован', 'success');
            showLoading(false);
        }

        async function loadFields() {
            if (currentMode === 'test') {
                loadTestFields();
                return;
            }
            
            const serverUrl = getServerUrl();
            if (!serverUrl) return;
            
            showLoading(true);
            document.getElementById('infoBox').innerHTML = '🔄 Загрузка полей из Google Sheets...';
            
            try {
                formFields = await loadRemoteFields();
                
                if (!formFields || formFields.length === 0) {
                    throw new Error('Нет полей для отображения');
                }
                
                renderForm(formFields);
                document.getElementById('infoBox').innerHTML = `✅ Загружено ${formFields.length} полей`;
                document.getElementById('status').innerHTML = `Статус: подключено к ${serverUrl} (${formFields.length} полей)`;
                showAlert(`✅ Форма загружена, ${formFields.length} полей`, 'success');
                showLoading(false);
                
            } catch (err) {
                console.error('Load error:', err);
                document.getElementById('infoBox').innerHTML = `❌ Ошибка: ${err.message}<br><br>💡 Проверьте:<br>• URL сервера<br>• Активен ли webhook в n8n<br>• Настроен ли CORS`;
                showAlert(`Ошибка: ${err.message}`, 'error');
                showLoading(false);
                document.getElementById('status').innerHTML = `Статус: ошибка подключения`;
            }
        }

        async function submitForm(e) {
            e.preventDefault();
            
            if (isSubmitting) return;
            
            if (!validateForm()) {
                showAlert('❌ Исправьте ошибки в форме', 'error');
                return;
            }
            
            if (currentMode === 'test') {
                showAlert('🧪 Тестовый режим: данные не отправлены', 'success');
                formFields.forEach(f => {
                    const inp = document.getElementById(f.id);
                    if (inp) inp.value = '';
                });
                return;
            }
            
            const urls = getUrls();
            if (!urls) return;
            
            isSubmitting = true;
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Сохранение...';
            btn.disabled = true;
            
            try {
                const data = [];
                formFields.forEach(f => {
                    const input = document.getElementById(f.id);
                    if (input && input.value.trim()) {
                        data.push({ id: f.id, value: input.value.trim() });
                    }
                });
                
                const response = await fetch(urls.saveData, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fields: data })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.success === false) {
                    throw new Error(result.message || 'Ошибка сохранения');
                }
                
                showAlert('✅ Данные сохранены в Google Sheets!', 'success');
                
                // Очищаем форму
                formFields.forEach(f => {
                    const inp = document.getElementById(f.id);
                    if (inp) inp.value = '';
                });
                
            } catch (err) {
                showAlert(`❌ Ошибка: ${err.message}`, 'error');
            } finally {
                isSubmitting = false;
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('form').addEventListener('submit', submitForm);
        });
    </script>
</body>
</html>
