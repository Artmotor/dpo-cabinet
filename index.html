<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Динамическая форма - Google Sheets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .config-section {
            background: #f7fafc;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .config-section label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
        }

        .config-section input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
            margin-bottom: 10px;
        }

        .config-section input:focus {
            outline: none;
            border-color: #667eea;
        }

        .mode-switch {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .info-box {
            background: #f7fafc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #48bb78;
        }

        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid #f56565;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input.error, select.error, textarea.error {
            border-color: #f56565;
            background: #fff5f5;
        }

        .error-message {
            color: #f56565;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            margin-bottom: 15px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            background: #f7fafc;
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
            color: #718096;
        }

        .test-badge {
            display: inline-block;
            background: #ed8936;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            margin-left: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>📊 Динамическая форма</h1>
                <p>Интеграция с Google Sheets</p>
            </div>
            <div class="content">
                <div class="config-section">
                    <label>🔗 URL сервера n8n:</label>
                    <input type="text" id="serverUrl" placeholder="https://ваш-сервер.n8n.io" value="">
                    <small style="color: #718096;">
                        Вставьте production URL из n8n (например: https://xxxxx.gw.dockhost.net)
                    </small>
                </div>

                <div class="mode-switch">
                    <button class="mode-btn active" onclick="setMode('remote')">🌐 Удаленный режим</button>
                    <button class="mode-btn" onclick="setMode('test')">🧪 Тестовый режим</button>
                </div>
                
                <div id="alert" class="alert"></div>
                
                <div class="info-box" id="infoBox">
                    ⚡ Настройте URL сервера и нажмите "Загрузить поля"
                </div>

                <button onclick="loadFields()" class="btn-secondary" id="loadBtn">🔄 Загрузить поля</button>
                
                <div id="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p style="text-align: center; margin-top: 10px;">Загрузка полей...</p>
                </div>
                
                <form id="form" style="display: none;">
                    <div id="fields"></div>
                    <button type="submit" id="submitBtn">💾 Сохранить данные</button>
                </form>
                
                <div class="status" id="status">
                    Статус: ожидание настройки
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'remote';
        let formFields = [];
        let isSubmitting = false;

        // Функция для тестирования CORS
        async function testCors(url) {
            try {
                const response = await fetch(url, {
                    method: 'OPTIONS',
                    mode: 'cors',
                    headers: {
                        'Origin': window.location.origin,
                        'Access-Control-Request-Method': 'GET',
                        'Access-Control-Request-Headers': 'Content-Type'
                    }
                });
                return response.ok;
            } catch (e) {
                return false;
            }
        }

        function getServerUrl() {
            let url = document.getElementById('serverUrl').value.trim();
            if (!url) {
                showAlert('❌ Введите URL сервера n8n', 'error');
                return null;
            }
            url = url.replace(/\/$/, '');
            
            // Проверяем, что URL начинается с http:// или https://
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            return url;
        }

        function getUrls() {
            const serverUrl = getServerUrl();
            if (!serverUrl) return null;
            return {
                getFields: `${serverUrl}/webhook/get-fields`,
                saveData: `${serverUrl}/webhook/save-data`
            };
        }

        const TEST_FIELDS = [
            { id: "email", label: "Email", type: "email", required: true, placeholder: "example@mail.com" },
            { id: "name", label: "Имя", type: "text", required: true, placeholder: "Ваше имя" },
            { id: "phone", label: "Телефон", type: "tel", required: true, placeholder: "+7 (999) 123-45-67" },
            { id: "message", label: "Сообщение", type: "textarea", required: false, placeholder: "Ваше сообщение" }
        ];

        function setMode(mode) {
            currentMode = mode;
            const buttons = document.querySelectorAll('.mode-btn');
            buttons.forEach(btn => {
                if ((mode === 'remote' && btn.textContent.includes('Удаленный')) ||
                    (mode === 'test' && btn.textContent.includes('Тестовый'))) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            if (mode === 'test') {
                document.getElementById('infoBox').innerHTML = '🧪 Тестовый режим: используются демо-поля <span class="test-badge">Данные не сохраняются</span>';
                loadTestFields();
            } else {
                document.getElementById('infoBox').innerHTML = '🌐 Удаленный режим: введите URL и нажмите "Загрузить поля"';
                document.getElementById('form').style.display = 'none';
                document.getElementById('status').innerHTML = 'Статус: удаленный режим, ожидание настройки';
            }
        }

        function showAlert(msg, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = msg;
            alertDiv.style.display = 'block';
            setTimeout(() => {
                alertDiv.style.opacity = '0';
                setTimeout(() => {
                    alertDiv.style.display = 'none';
                    alertDiv.style.opacity = '1';
                }, 300);
            }, 5000);
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('loadBtn').disabled = show;
        }

        function renderForm(fields) {
            const container = document.getElementById('fields');
            container.innerHTML = '';
            
            fields.forEach((field, index) => {
                const div = document.createElement('div');
                div.className = 'form-group';
                const requiredMark = field.required ? '<span style="color:#f56565"> *</span>' : '';
                
                let inputHtml = '';
                if (field.type === 'textarea') {
                    inputHtml = `<textarea id="${field.id}" placeholder="${field.placeholder || ''}" rows="4"></textarea>`;
                } else if (field.type === 'select' && field.options) {
                    inputHtml = `<select id="${field.id}">
                        <option value="">Выберите...</option>
                        ${field.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                    </select>`;
                } else {
                    inputHtml = `<input type="${field.type || 'text'}" id="${field.id}" placeholder="${field.placeholder || ''}" ${field.required ? 'required' : ''}>`;
                }
                
                div.innerHTML = `
                    <label>${field.label}${requiredMark}</label>
                    ${inputHtml}
                    <div class="error-message" id="${field.id}-error"></div>
                `;
                container.appendChild(div);
                
                const input = document.getElementById(field.id);
                if (input) {
                    input.addEventListener('input', () => validateField(field.id));
                    input.addEventListener('blur', () => validateField(field.id));
                }
            });
        }

        function validateField(fieldId) {
            const input = document.getElementById(fieldId);
            const errorDiv = document.getElementById(`${fieldId}-error`);
            const field = formFields.find(f => f.id === fieldId);
            
            if (!input || !field) return true;
            
            const value = input.value.trim();
            let isValid = true;
            let msg = '';
            
            if (field.required && !value) {
                isValid = false;
                msg = '⚠️ Обязательное поле';
            } else if (field.type === 'email' && value && !/^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(value)) {
                isValid = false;
                msg = '❌ Неверный формат email';
            } else if (field.type === 'tel' && value && !/^[\d\s+()-]{10,}$/.test(value)) {
                isValid = false;
                msg = '❌ Неверный формат телефона';
            }
            
            if (!isValid) {
                input.classList.add('error');
                errorDiv.textContent = msg;
                errorDiv.style.display = 'block';
            } else {
                input.classList.remove('error');
                errorDiv.style.display = 'none';
            }
            
            return isValid;
        }

        function validateForm() {
            let valid = true;
            formFields.forEach(f => {
                if (!validateField(f.id)) valid = false;
            });
            return valid;
        }

        function getFormData() {
            const data = {};
            formFields.forEach(f => {
                const input = document.getElementById(f.id);
                if (input) {
                    data[f.id] = input.value.trim();
                }
            });
            return data;
        }

        async function loadRemoteFields() {
            const urls = getUrls();
            if (!urls) throw new Error('URL не указан');
            
            // Пробуем выполнить запрос с таймаутом
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            
            try {
                const response = await fetch(urls.getFields, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    signal: controller.signal,
                    mode: 'cors'
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('Webhook не найден (404). Проверьте URL и активирован ли webhook в n8n');
                    }
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                // Поддерживаем разные форматы ответа
                if (Array.isArray(data)) {
                    return data.map(item => ({
                        id: item.id || item.name || item.field,
                        label: item.label || item.name || item.id,
                        type: item.type || 'text',
                        required: item.required || false,
                        placeholder: item.placeholder || ''
                    }));
                } else if (data.fields && Array.isArray(data.fields)) {
                    return data.fields;
                } else if (data.data && Array.isArray(data.data)) {
                    return data.data;
                } else {
                    // Если получили объект с данными из таблицы
                    const firstRow = data[Object.keys(data)[0]];
                    if (firstRow && typeof firstRow === 'object') {
                        return Object.keys(firstRow).map(key => ({
                            id: key,
                            label: key.charAt(0).toUpperCase() + key.slice(1),
                            type: 'text',
                            required: false
                        }));
                    }
                    throw new Error('Неверный формат ответа от сервера');
                }
            } catch (err) {
                clearTimeout(timeoutId);
                if (err.name === 'AbortError') {
                    throw new Error('Превышен таймаут (10 сек). Проверьте доступность сервера');
                }
                throw err;
            }
        }

        async function loadTestFields() {
            showLoading(true);
            try {
                formFields = TEST_FIELDS;
                renderForm(formFields);
                document.getElementById('infoBox').innerHTML = `🧪 Тестовый режим: загружено ${formFields.length} полей <span class="test-badge">Данные не сохраняются</span>`;
                document.getElementById('status').innerHTML = `✅ Тестовый режим: ${formFields.length} полей (демо-данные)`;
                document.getElementById('form').style.display = 'block';
                showAlert('✅ Тестовые поля загружены. Данные не будут отправлены на сервер.', 'success');
            } catch (err) {
                showAlert(`❌ Ошибка: ${err.message}`, 'error');
            } finally {
                showLoading(false);
            }
        }

        async function loadFields() {
            if (currentMode === 'test') {
                await loadTestFields();
                return;
            }
            
            const serverUrl = getServerUrl();
            if (!serverUrl) return;
            
            showLoading(true);
            document.getElementById('infoBox').innerHTML = '🔄 Загрузка полей из Google Sheets...';
            
            try {
                formFields = await loadRemoteFields();
                
                if (!formFields || formFields.length === 0) {
                    throw new Error('Нет полей для отображения');
                }
                
                renderForm(formFields);
                document.getElementById('infoBox').innerHTML = `✅ Загружено ${formFields.length} полей из Google Sheets`;
                document.getElementById('status').innerHTML = `✅ Подключено к ${serverUrl} | ${formFields.length} полей`;
                document.getElementById('form').style.display = 'block';
                showAlert(`✅ Форма загружена (${formFields.length} полей)`, 'success');
                
            } catch (err) {
                console.error('Load error:', err);
                let errorMsg = err.message;
                if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
                    errorMsg = 'Не удалось подключиться к серверу. Проверьте:\n• Правильность URL\n• Активен ли webhook в n8n (Webhook GET должен быть активирован)\n• Настроены ли CORS заголовки в n8n\n• Доступен ли сервер из интернета';
                } else if (err.message.includes('404')) {
                    errorMsg = 'Webhook не найден. Убедитесь, что в n8n:\n• Webhook GET активирован (кнопка "Active")\n• Путь webhook: /webhook/get-fields\n• Webhook имеет статус "Waiting for connection"';
                }
                document.getElementById('infoBox').innerHTML = `❌ Ошибка: ${errorMsg}`;
                document.getElementById('status').innerHTML = `❌ Ошибка: ${err.message}`;
                showAlert(`❌ Ошибка загрузки: ${errorMsg}`, 'error');
                document.getElementById('form').style.display = 'none';
            } finally {
                showLoading(false);
            }
        }

        async function submitForm(e) {
            e.preventDefault();
            
            if (isSubmitting) return;
            
            if (!validateForm()) {
                showAlert('❌ Пожалуйста, исправьте ошибки в форме', 'error');
                return;
            }
            
            if (currentMode === 'test') {
                const data = getFormData();
                console.log('Test mode data:', data);
                showAlert('🧪 Тестовый режим: данные не отправлены, форма очищена', 'success');
                formFields.forEach(f => {
                    const inp = document.getElementById(f.id);
                    if (inp) inp.value = '';
                });
                return;
            }
            
            const urls = getUrls();
            if (!urls) return;
            
            isSubmitting = true;
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Сохранение...';
            btn.disabled = true;
            
            try {
                const formData = getFormData();
                
                const response = await fetch(urls.saveData, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ 
                        ...formData,
                        timestamp: new Date().toISOString()
                    })
                });
                
                if (!response.ok) {
                    let errorMsg = `HTTP ${response.status}`;
                    try {
                        const errorData = await response.json();
                        errorMsg = errorData.message || errorMsg;
                    } catch (e) {
                        errorMsg = await response.text() || errorMsg;
                    }
                    throw new Error(errorMsg);
                }
                
                const result = await response.json();
                
                if (result.success === false) {
                    throw new Error(result.message || 'Ошибка сохранения');
                }
                
                showAlert('✅ Данные успешно сохранены в Google Sheets!', 'success');
                
                // Очищаем форму
                formFields.forEach(f => {
                    const inp = document.getElementById(f.id);
                    if (inp) inp.value = '';
                });
                
            } catch (err) {
                console.error('Submit error:', err);
                let errorMsg = err.message;
                if (err.message.includes('Failed to fetch')) {
                    errorMsg = 'Не удалось отправить данные. Проверьте CORS настройки в n8n';
                }
                showAlert(`❌ Ошибка сохранения: ${errorMsg}`, 'error');
            } finally {
                isSubmitting = false;
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('form').addEventListener('submit', submitForm);
            
            // Попытка загрузить сохраненный URL из localStorage
            const savedUrl = localStorage.getItem('n8n_server_url');
            if (savedUrl) {
                document.getElementById('serverUrl').value = savedUrl;
            }
            
            // Сохраняем URL при изменении
            document.getElementById('serverUrl').addEventListener('change', () => {
                localStorage.setItem('n8n_server_url', document.getElementById('serverUrl').value);
            });
        });
    </script>
</body>
</html>
