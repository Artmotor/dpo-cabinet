<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Динамическая форма | Google Sheets Integration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .form-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
        }

        .form-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 40px;
            color: white;
            text-align: center;
        }

        .form-header h1 {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .form-header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .header-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .form-content {
            padding: 40px;
            background: white;
        }

        .info-box {
            background: linear-gradient(135deg, var(--gray-50) 0%, white 100%);
            border-left: 4px solid var(--primary);
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--gray-600);
        }

        .form-group {
            margin-bottom: 28px;
            animation: slideInUp 0.5s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--gray-700);
            font-size: 14px;
        }

        .required-star {
            color: var(--danger);
            margin-left: 4px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        input.error, select.error, textarea.error {
            border-color: var(--danger);
            background: #fef2f2;
        }

        .error-message {
            color: var(--danger);
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            font-size: 14px;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid var(--success);
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid var(--danger);
        }

        .alert-close {
            margin-left: auto;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .form-header {
                padding: 30px 20px;
            }
            
            .form-header h1 {
                font-size: 24px;
            }
            
            .form-content {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <div class="form-header">
                <div class="header-icon">📊</div>
                <h1>Динамическая форма ввода</h1>
                <p>Поля автоматически генерируются из Google Sheets</p>
            </div>
            <div class="form-content">
                <div id="alertContainer"></div>
                
                <div class="info-box" id="infoBox">
                    <span class="info-icon">⚡</span>
                    <span id="infoText">Загрузка полей формы...</span>
                </div>
                
                <div id="loadingContainer" style="display: none;">
                    <div style="text-align: center; padding: 40px;">
                        <div class="spinner"></div>
                        <p style="margin-top: 16px; color: var(--gray-500);">Загрузка данных...</p>
                    </div>
                </div>
                
                <form id="dynamicForm" style="display: none;">
                    <div id="formFields"></div>
                    <button type="submit" class="submit-btn" id="submitBtn">
                        💾 Сохранить данные
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ========== КОНФИГУРАЦИЯ ==========
        const N8N_WEBHOOK_URL = 'https://4yzm-gv2z-j6ws.gw-1a.dockhost.net';
        
        // Используем CORS прокси для обхода CORS ограничений
        // Вариант 1: Использовать публичный прокси (может быть нестабильным)
        // const CORS_PROXY = 'https://cors-anywhere.herokuapp.com/';
        
        // Вариант 2: Использовать свой прокси (рекомендуется)
        // const CORS_PROXY = 'https://ваш-прокси.herokuapp.com/';
        
        // Вариант 3: Без прокси (если CORS настроен в n8n)
        const CORS_PROXY = ''; // Пустая строка = без прокси
        
        const GET_FIELDS_ENDPOINT = `${CORS_PROXY}${N8N_WEBHOOK_URL}/webhook/get-fields`;
        const SAVE_DATA_ENDPOINT = `${CORS_PROXY}${N8N_WEBHOOK_URL}/webhook/save-data`;
        
        console.log('GET Fields URL:', GET_FIELDS_ENDPOINT);
        console.log('POST Save URL:', SAVE_DATA_ENDPOINT);
        
        let formFields = [];
        let isSubmitting = false;
        
        function showAlert(message, type = 'success', duration = 5000) {
            const alertContainer = document.getElementById('alertContainer');
            const alertId = 'alert_' + Date.now();
            
            const icons = {
                success: '✅',
                error: '❌',
                warning: '⚠️'
            };
            
            const alertHtml = `
                <div id="${alertId}" class="alert alert-${type}">
                    <span>${icons[type] || 'ℹ️'}</span>
                    <span>${message}</span>
                    <span class="alert-close" onclick="closeAlert('${alertId}')">✕</span>
                </div>
            `;
            
            alertContainer.insertAdjacentHTML('beforeend', alertHtml);
            
            if (duration > 0) {
                setTimeout(() => closeAlert(alertId), duration);
            }
        }
        
        function closeAlert(alertId) {
            const alert = document.getElementById(alertId);
            if (alert) alert.remove();
        }
        
        function showLoading(show) {
            const loadingContainer = document.getElementById('loadingContainer');
            const form = document.getElementById('dynamicForm');
            const infoBox = document.getElementById('infoBox');
            
            if (show) {
                loadingContainer.style.display = 'block';
                form.style.display = 'none';
                infoBox.style.display = 'none';
            } else {
                loadingContainer.style.display = 'none';
                form.style.display = 'block';
                infoBox.style.display = 'flex';
            }
        }
        
        function validateField(fieldId) {
            const input = document.getElementById(fieldId);
            const errorDiv = document.getElementById(`${fieldId}-error`);
            const field = formFields.find(f => f.id === fieldId);
            
            if (!input || !errorDiv || !field) return true;
            
            let isValid = true;
            let errorMessage = '';
            const value = input.value.trim();
            
            if (field.required && !value) {
                isValid = false;
                errorMessage = 'Это поле обязательно для заполнения';
            } else if (field.type === 'email' && value) {
                const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
                if (!emailRegex.test(value)) {
                    isValid = false;
                    errorMessage = 'Введите корректный email адрес';
                }
            } else if (field.type === 'tel' && value) {
                const phoneRegex = /^[\d\s+()-]{10,}$/;
                if (!phoneRegex.test(value)) {
                    isValid = false;
                    errorMessage = 'Введите корректный номер телефона';
                }
            }
            
            if (!isValid) {
                input.classList.add('error');
                errorDiv.textContent = errorMessage;
                errorDiv.classList.add('show');
            } else {
                input.classList.remove('error');
                errorDiv.classList.remove('show');
            }
            
            return isValid;
        }
        
        function validateForm() {
            let isValid = true;
            formFields.forEach(field => {
                if (!validateField(field.id)) isValid = false;
            });
            return isValid;
        }
        
        function renderForm(fields) {
            const formFieldsContainer = document.getElementById('formFields');
            formFieldsContainer.innerHTML = '';
            
            fields.forEach((field, index) => {
                const formGroup = document.createElement('div');
                formGroup.className = 'form-group';
                formGroup.style.animationDelay = `${index * 0.05}s`;
                
                const label = document.createElement('label');
                label.htmlFor = field.id;
                label.textContent = field.label;
                if (field.required) {
                    const star = document.createElement('span');
                    star.className = 'required-star';
                    star.textContent = ' *';
                    label.appendChild(star);
                }
                
                const input = document.createElement('input');
                input.type = field.type || 'text';
                input.id = field.id;
                input.name = field.id;
                input.required = field.required;
                input.placeholder = field.placeholder || `Введите ${field.label.toLowerCase()}`;
                
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.id = `${field.id}-error`;
                
                formGroup.appendChild(label);
                formGroup.appendChild(input);
                formGroup.appendChild(errorDiv);
                formFieldsContainer.appendChild(formGroup);
                
                input.addEventListener('input', () => validateField(field.id));
                input.addEventListener('blur', () => validateField(field.id));
            });
        }
        
        async function loadFields() {
            showLoading(true);
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);
                
                const response = await fetch(GET_FIELDS_ENDPOINT, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('Loaded fields:', data);
                
                if (data.fields && Array.isArray(data.fields)) {
                    formFields = data.fields;
                } else if (Array.isArray(data)) {
                    formFields = data;
                } else {
                    throw new Error('Неверный формат данных');
                }
                
                if (formFields.length === 0) {
                    throw new Error('Нет полей для отображения');
                }
                
                renderForm(formFields);
                
                document.getElementById('infoText').innerHTML = `📋 Найдено ${formFields.length} полей для заполнения`;
                showLoading(false);
                showAlert('Форма успешно загружена!', 'success', 3000);
                
            } catch (error) {
                console.error('Load error:', error);
                
                let errorMessage = '';
                if (error.name === 'AbortError') {
                    errorMessage = 'Превышено время ожидания. Проверьте подключение к n8n';
                } else if (error.message.includes('Failed to fetch')) {
                    errorMessage = 'Ошибка CORS. Вам нужно настроить CORS в n8n или использовать прокси. Подробности в консоли.';
                } else {
                    errorMessage = error.message;
                }
                
                showAlert(errorMessage, 'error', 8000);
                document.getElementById('infoText').innerHTML = '❌ ' + errorMessage;
                showLoading(false);
            }
        }
        
        async function submitForm(event) {
            event.preventDefault();
            
            if (isSubmitting) {
                showAlert('Данные уже отправляются', 'warning', 2000);
                return;
            }
            
            if (!validateForm()) {
                showAlert('Исправьте ошибки в форме', 'error', 4000);
                return;
            }
            
            isSubmitting = true;
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '⏳ Сохранение...';
            submitBtn.disabled = true;
            
            try {
                const formData = [];
                formFields.forEach(field => {
                    const input = document.getElementById(field.id);
                    if (input && input.value.trim()) {
                        formData.push({
                            id: field.id,
                            value: input.value.trim()
                        });
                    }
                });
                
                const payload = {
                    fields: formData,
                    timestamp: new Date().toISOString()
                };
                
                const response = await fetch(SAVE_DATA_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.success !== false) {
                    showAlert('✅ Данные успешно сохранены!', 'success', 5000);
                    
                    formFields.forEach(field => {
                        const input = document.getElementById(field.id);
                        if (input) input.value = '';
                    });
                } else {
                    throw new Error(result.message || 'Ошибка сохранения');
                }
                
            } catch (error) {
                console.error('Save error:', error);
                showAlert('❌ Ошибка сохранения: ' + error.message, 'error', 7000);
            } finally {
                isSubmitting = false;
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            console.log('App started');
            console.log('Origin:', window.location.origin);
            loadFields();
            document.getElementById('dynamicForm').addEventListener('submit', submitForm);
        });
    </script>
</body>
</html>
